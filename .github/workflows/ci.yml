name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.1"
      - run: deno task fmt
      - run: deno task lint
      - run: deno task check

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.1"
      - run: deno task compile
      - uses: actions/upload-artifact@v4
        with:
          name: anyapi-mcp-${{ github.sha }}
          path: anyapi-mcp
          retention-days: 7
